services:
  - type: web
    name: training-manager
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120
    # Persistent Disk (optional, $0.25/GB/Monat – nur auf bezahlten Plänen verfügbar)
    # disk:
    #   name: data
    #   mountPath: /data
    #   sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
      # DB_PATH nur setzen wenn Disk aktiviert ist (s.o.):
      # - key: DB_PATH
      #   value: /data/training.db
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
