name: Fly Deploy

# Deployt automatisch zu Fly.io bei jedem Push auf main.
# Manuell ausloesbar ueber den "Run workflow"-Button im Actions-Tab.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group   # verhindert parallele Deploys
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
