{% extends "base.html" %}
{% block title %}Kalender – Training Manager{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Trainingskalender</h1>
    <p class="page-subtitle">Plane und verwalte deine Trainingseinheiten</p>
  </div>
  <button class="btn btn-primary" onclick="showCreateTrainingModal(null)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Neues Training
  </button>
</div>

<div class="calendar-layout">
  <!-- Calendar -->
  <div class="calendar-card">
    <div class="calendar-nav">
      <button class="cal-today-btn" onclick="goToToday()">Heute</button>
      <div class="cal-nav-center">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
        </button>
        <h2 id="cal-month-title" class="cal-title"></h2>
        <button class="cal-nav-btn" onclick="changeMonth(1)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
        </button>
      </div>
      <div style="width:60px"></div>
    </div>

    <div class="calendar-grid">
      <div class="cal-day-name">Mo</div>
      <div class="cal-day-name">Di</div>
      <div class="cal-day-name">Mi</div>
      <div class="cal-day-name">Do</div>
      <div class="cal-day-name">Fr</div>
      <div class="cal-day-name">Sa</div>
      <div class="cal-day-name">So</div>
      <div id="cal-days"></div>
    </div>
  </div>

  <!-- Sidebar: training list for selected day -->
  <div class="cal-sidebar">
    <div id="cal-detail">
      <div class="cal-detail-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <p>Klicke auf einen Tag um Trainings zu sehen</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
{% endblock %}
