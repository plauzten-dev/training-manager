{% extends "base.html" %}
{% block title %}Übungen – Training Manager{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Übungsdatenbank</h1>
    <p class="page-subtitle">Alle Übungen auf einen Blick</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn btn-ghost fav-toggle-btn" id="fav-toggle-btn" onclick="toggleFavoritesView()" title="Meine Favoriten">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="fav-toggle-label">Favoriten</span>
    </button>
    <button class="btn btn-ghost" onclick="showImportFromLinkModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="via-link-label">Via Link</span>
    </button>
    <button class="btn btn-primary" onclick="showCreateExerciseModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Neue Übung
    </button>
  </div>
</div>

<div class="sport-tabs-bar">
  <button class="sport-tab active" data-sport="" onclick="setSport(this,'')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="8" y1="2" x2="8" y2="14"/></svg>
    Alle Sportarten
  </button>
  <button class="sport-tab" data-sport="Fußball" onclick="setSport(this,'Fußball')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="3" width="14" height="10" rx="1"/><line x1="8" y1="3" x2="8" y2="13"/><circle cx="8" cy="8" r="2.5"/><rect x="1" y="5" width="3" height="6" rx="0.5"/><rect x="12" y="5" width="3" height="6" rx="0.5"/></svg>
    Fußball
  </button>
  <button class="sport-tab" data-sport="Tennis" onclick="setSport(this,'Tennis')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="14" height="14" rx="1"/><line x1="8" y1="1" x2="8" y2="15"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="4" y1="3" x2="4" y2="13"/><line x1="12" y1="3" x2="12" y2="13"/></svg>
    Tennis
  </button>
  <button class="sport-tab" data-sport="Floorball" onclick="setSport(this,'Floorball')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="3" width="14" height="10" rx="4"/><circle cx="8" cy="8" r="2"/><line x1="8" y1="3" x2="8" y2="13"/><rect x="1" y="5" width="3" height="6" rx="1"/><rect x="12" y="5" width="3" height="6" rx="1"/></svg>
    Floorball
  </button>
  <button class="sport-tab" data-sport="Basketball" onclick="setSport(this,'Basketball')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6.5"/><line x1="1.5" y1="8" x2="14.5" y2="8"/><path d="M5 1.8 C7 4.5 7 11.5 5 14.2"/><path d="M11 1.8 C9 4.5 9 11.5 11 14.2"/></svg>
    Basketball
  </button>
  <button class="sport-tab" data-sport="Volleyball" onclick="setSport(this,'Volleyball')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6.5"/><path d="M1.5 10 C4 9 6 9 8 9.5"/><path d="M8 9.5 C10 10 12 10 14.5 10"/><path d="M8 1.5 C8 4 6 6.5 1.5 10"/><path d="M8 1.5 C8 4 10 6.5 14.5 10"/></svg>
    Volleyball
  </button>
  <button class="sport-tab" data-sport="Gym" onclick="setSport(this,'Gym')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="0.75" y="6" width="2.5" height="4" rx="0.75"/><rect x="12.75" y="6" width="2.5" height="4" rx="0.75"/><rect x="3" y="4.5" width="2" height="7" rx="0.75"/><rect x="11" y="4.5" width="2" height="7" rx="0.75"/><line x1="5" y1="8" x2="11" y2="8" stroke-width="2.2"/></svg>
    Gym
  </button>
  <button class="sport-tab" data-sport="Allgemein" onclick="setSport(this,'Allgemein')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="3.2" r="1.5"/><line x1="8" y1="4.7" x2="8" y2="10"/><path d="M5 7 L8 6 L11 7"/><path d="M6.5 10 L5.5 13.5"/><path d="M9.5 10 L10.5 13.5"/></svg>
    Allgemein
  </button>
</div>

<!-- Mobile Sport Selector (≤640px) -->
<div class="sport-sel-mob" id="sport-sel-mob">
  <button class="sport-sel-mob-trigger" id="sport-sel-mob-trigger" onclick="toggleSportSelMobile(event)">
    <span class="sport-sel-mob-dot" id="sport-sel-mob-dot" style="background:#64748b"></span>
    <span id="sport-sel-mob-label">Alle Sportarten</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-left:auto;opacity:.55"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
  <div class="sport-sel-mob-panel" id="sport-sel-mob-panel">
    <button class="sport-sel-opt" data-sport="" onclick="setSport(null,'')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="8" y1="2" x2="8" y2="14"/></svg>
      Alle Sportarten
    </button>
    <button class="sport-sel-opt" data-sport="Fußball" onclick="setSport(null,'Fußball')">
      <span class="sport-sel-dot-sm" style="background:#16a34a"></span>Fußball
    </button>
    <button class="sport-sel-opt" data-sport="Tennis" onclick="setSport(null,'Tennis')">
      <span class="sport-sel-dot-sm" style="background:#ea580c"></span>Tennis
    </button>
    <button class="sport-sel-opt" data-sport="Floorball" onclick="setSport(null,'Floorball')">
      <span class="sport-sel-dot-sm" style="background:#3b82f6"></span>Floorball
    </button>
    <button class="sport-sel-opt" data-sport="Basketball" onclick="setSport(null,'Basketball')">
      <span class="sport-sel-dot-sm" style="background:#7c3aed"></span>Basketball
    </button>
    <button class="sport-sel-opt" data-sport="Volleyball" onclick="setSport(null,'Volleyball')">
      <span class="sport-sel-dot-sm" style="background:#d97706"></span>Volleyball
    </button>
    <button class="sport-sel-opt" data-sport="Gym" onclick="setSport(null,'Gym')">
      <span class="sport-sel-dot-sm" style="background:#4b5563"></span>Gym
    </button>
    <button class="sport-sel-opt" data-sport="Allgemein" onclick="setSport(null,'Allgemein')">
      <span class="sport-sel-dot-sm" style="background:#0d9488"></span>Allgemein
    </button>
  </div>
</div>

<button class="mobile-filter-btn" id="mobile-filter-toggle" onclick="toggleMobileFilter()" style="display:none">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
  <span id="filter-btn-label">Filter anzeigen</span>
</button>

<div class="exercises-layout">
  <!-- Filter sidebar -->
  <aside class="filter-sidebar">
    <div class="filter-header">
      <h3>Filter</h3>
      <button class="btn-link" onclick="resetFilters()">Zurücksetzen</button>
    </div>

    <div class="filter-group">
      <label class="filter-label">Suche</label>
      <input type="text" id="search-input" class="filter-input" placeholder="Übung suchen..." oninput="debounceSearch()">
    </div>

    <div class="filter-group">
      <label class="filter-label">Feldspieler</label>
      <select id="filter-players" class="filter-select" onchange="applyFilters()">
        <option value="">Alle</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Torhüter</label>
      <select id="filter-gk" class="filter-select" onchange="applyFilters()">
        <option value="">Alle</option>
        <option value="0">0 Torhüter</option>
        <option value="1">1 Torhüter</option>
        <option value="2">2 Torhüter</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Kernkompetenz</label>
      <select id="filter-competency" class="filter-select" onchange="applyFilters()">
        <option value="">Alle</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Schwierigkeitsgrad</label>
      <div class="filter-checks" id="filter-difficulty">
        <label class="check-item">
          <input type="radio" name="difficulty" value="" checked onchange="applyFilters()"> Alle
        </label>
        <label class="check-item">
          <input type="radio" name="difficulty" value="Anfänger" onchange="applyFilters()"> Anfänger
        </label>
        <label class="check-item">
          <input type="radio" name="difficulty" value="Fortgeschritten" onchange="applyFilters()"> Fortgeschritten
        </label>
        <label class="check-item">
          <input type="radio" name="difficulty" value="Profi" onchange="applyFilters()"> Profi
        </label>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Spielfeldgröße</label>
      <select id="filter-fieldsize" class="filter-select" onchange="applyFilters()">
        <option value="">Alle</option>
      </select>
    </div>
  </aside>

  <!-- Exercise grid -->
  <div class="exercises-main">
    <div class="exercises-count" id="exercises-count"></div>
    <div class="exercises-grid" id="exercises-grid">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p>Übungen werden geladen...</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/exercises.js') }}"></script>
{% endblock %}
