<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login – Training Manager</title>

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0f1f35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Training">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
  <!-- PWA Splash Screen -->
  <div id="splash-screen" style="display:none">
    <div class="splash-logo">
      <svg width="52" height="52" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="5" width="24" height="18" rx="2" stroke="#4ade80" stroke-width="1.8"/>
        <line x1="2" y1="14" x2="26" y2="14" stroke="#4ade80" stroke-width="1.4"/>
        <circle cx="14" cy="14" r="4" stroke="#4ade80" stroke-width="1.4"/>
        <rect x="2" y="9" width="5" height="10" rx="1" stroke="#4ade80" stroke-width="1.2"/>
        <rect x="21" y="9" width="5" height="10" rx="1" stroke="#4ade80" stroke-width="1.2"/>
        <circle cx="14" cy="14" r="1" fill="#4ade80"/>
      </svg>
      <span class="splash-logo-text">Training Manager</span>
      <div class="splash-bar"></div>
      <span class="splash-version">B.0.26</span>
    </div>
  </div>

  <div class="login-page">
    <!-- Left panel -->
    <div class="login-hero">
      <div class="hero-content">
        <div class="hero-logo">⚽</div>
        <h1>Training Manager</h1>
        <p>Plane deine Trainings. Verwalte Übungen. Werde besser.</p>
        <div class="hero-features">
          <div class="hero-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
            Übungsdatenbank mit Bildern & Erklärungen
          </div>
          <div class="hero-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
            Trainingskalender & -planung
          </div>
          <div class="hero-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Persönliches Konto – nur für dich
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel: Form -->
    <div class="login-form-panel">
      <div class="login-form-container">
        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Anmelden</button>
          <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Registrieren</button>
        </div>

        <!-- TODO: VOR RELEASE ENTFERNEN -->
        <button type="button" class="btn-test-login" onclick="testLogin()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
          Testaccount – Sofort einloggen
        </button>

        <!-- Login form -->
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Benutzername oder E-Mail</label>
            <input type="text" id="login-username" placeholder="Benutzername oder E-Mail" required autocomplete="username">
          </div>
          <div class="form-group">
            <label>Passwort</label>
            <input type="password" id="login-password" placeholder="Passwort" required autocomplete="current-password">
          </div>
          <div id="login-error" class="form-error hidden"></div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            Anmelden
          </button>
        </form>

        <!-- Register form -->
        <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Benutzername</label>
            <input type="text" id="reg-username" placeholder="Dein Benutzername" required autocomplete="username">
          </div>
          <div class="form-group">
            <label>E-Mail</label>
            <input type="email" id="reg-email" placeholder="deine@email.de" required autocomplete="email">
          </div>
          <div class="form-group">
            <label>Passwort</label>
            <input type="password" id="reg-password" placeholder="Mindestens 6 Zeichen" required minlength="6" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label>Passwort wiederholen</label>
            <input type="password" id="reg-password2" placeholder="Passwort wiederholen" required autocomplete="new-password">
          </div>
          <div id="register-error" class="form-error hidden"></div>
          <button type="submit" class="btn btn-primary btn-full" id="register-btn">
            Konto erstellen
          </button>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    function switchTab(tab) {
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
      }
    }

    async function testLogin() {
      const btn = document.querySelector('.btn-test-login');
      btn.disabled = true;
      btn.textContent = 'Einloggen...';
      const res = await fetch('/api/auth/test-login', { method: 'POST' });
      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        btn.disabled = false;
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg> Testaccount – Sofort einloggen';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Wird angemeldet...';
      errEl.classList.add('hidden');

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('login-username').value,
          password: document.getElementById('login-password').value
        })
      });
      const data = await res.json();

      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        errEl.textContent = data.error;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Anmelden';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errEl = document.getElementById('register-error');
      const pw1 = document.getElementById('reg-password').value;
      const pw2 = document.getElementById('reg-password2').value;

      errEl.classList.add('hidden');
      if (pw1 !== pw2) {
        errEl.textContent = 'Passwörter stimmen nicht überein';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Konto wird erstellt...';

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('reg-username').value,
          email: document.getElementById('reg-email').value,
          password: pw1
        })
      });
      const data = await res.json();

      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        errEl.textContent = data.error;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Konto erstellen';
      }
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' });
    }

    (function() {
      const isStandalone = window.navigator.standalone === true ||
                           window.matchMedia('(display-mode: standalone)').matches;
      if (!isStandalone) return;
      if (sessionStorage.getItem('splashShown')) return;
      sessionStorage.setItem('splashShown', '1');
      document.documentElement.style.background = '#0f1f35';
      document.body.style.background = '#0f1f35';
      const splash = document.getElementById('splash-screen');
      splash.style.display = 'flex';
      setTimeout(() => {
        splash.classList.add('splash-hide');
        setTimeout(() => {
          splash.remove();
          document.documentElement.style.background = '';
          document.body.style.background = '';
        }, 400);
      }, 1400);
    })();
  </script>
</body>
</html>
