# fly.toml app configuration file generated for training-manager on 2026-06-08T18:57:23Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'training-manager'
primary_region = 'fra'

[build]

[env]
  DB_PATH = '/data/training.db'
  PORT = '8080'

[[mounts]]
  source = 'training_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
