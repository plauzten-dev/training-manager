app = 'training-manager'
primary_region = 'fra'

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/training.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'training_data'
  destination = '/data'
